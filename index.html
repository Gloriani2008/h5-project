  },
  pharma:{
    title:"AI + 医药研发 / 生物信息",

    fit:"你的<b>药学/生物/化学背景</b>是进入这个赛道最难复制的部分。AI工程师学不来你对实验流程和生物机制的理解。这个组合，正是药企AI团队最想要的。",
    jobs_pg:[{n:"AI药物发现研究员",t:"大型药企/Biotech"},{n:"高级生物信息工程师",t:"CRO/基因公司"},{n:"生信算法专家",t:"医药研究机构"}],
    jobs_ug:[{n:"临床数据处理专员",t:"CRO机构"},{n:"实验室自动化技术员",t:"研发机构"},{n:"医药研发辅助运营",t:"药企"}],
    teaser:"<b>但药企、CRO、基因公司——不同机构对背景要求差异很大。</b>你的具体专业对应哪类机构的岗位，需要在简历上做精准优化。"

    jobs_ug:[{n:"智能合同审核助理",t:"企业法务部"},{n:"法律科技产品运营",t:"法律AI公司"},{n:"基础合规数据专员",t:"咨询/律所"}],
    teaser:"<b>但律所、企业法务、法律AI公司——三个方向的发展路径差异非常大。</b>哪个入口对你现阶段最可及，需要顾问帮你做一对一分析。"

let allQs=[],cur=0,answers={},selected=null,majorVal=null;

function buildQs(){
  allQs=[...baseQs];
  if(majorVal!==null && q8Map[majorVal]){allQs.push(q8Map[majorVal]);}
  allQs.push(q9);
}

function render(){
  const q=allQs[cur],total=allQs.length;
  document.getElementById('prog').style.width=`${((cur+1)/total)*100}%`;
  document.getElementById('prog-txt').textContent=`${cur+1} / ${total}`;
  document.getElementById('q-num').textContent=`问题 ${cur+1}`;
  document.getElementById('q-text').textContent=q.q;
  const hint=document.getElementById('q-hint');
  if(q.hint){hint.textContent=q.hint;hint.style.display='block';}
  else{hint.style.display='none';}
  const wrap=document.getElementById('opts-wrap');
  wrap.innerHTML='';
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt';
    d.innerHTML=`<div class="dot"></div><div class="opt-txt">${o}</div>`;
    d.onclick=()=>sel(i,d);
    wrap.appendChild(d);
  });
  document.getElementById('btn-next').disabled=true;
  selected=null;
  document.getElementById('btn-next').textContent=cur===allQs.length-1?'查看我的方向 →':'下一题 →';
}

function sel(i,el){
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');selected=i;
  document.getElementById('btn-next').disabled=false;
}

function nextQ(){
  if(selected===null)return;
  const q=allQs[cur];
  answers[q.id]=selected;
  if(q.id==='q2'){majorVal=selected;buildQs();}
  if(cur<allQs.length-1){cur++;render();}
  else showLoad();
}

function showLoad(){
  document.getElementById('quiz-sec').style.display='none';
  document.getElementById('load-sec').style.display='block';
  setTimeout(showResult,2200);
}

// 【升级点2】严密的交叉算法，AI技能(Q4)和细分专业(Q8)真正决定了结果
function getDir(){
  const major = answers['q2'];      
  const employer = answers['q3'];   
  const aiLevel = answers['q4'];    
  const q8 = answers['q8'];         
  const q9v = answers['q9'];        

  if (major === 3) {
    if (q8 === 0) return 'legal'; 
    if (aiLevel >= 2) return 'finance_risk'; // 文科如果懂代码/建模，分流到合规风控
    return 'legal'; 
  }
  
  if (major === 2) {
    if (q8 === 1 || q8 === 2) return 'pharma'; 
    return 'medical'; 
  }
  
  if (major === 1) {
    if (q8 >= 2 || aiLevel >= 2 || q9v === 0) return 'quant'; 
    return 'finance_risk';
  }
  
  if (major === 0) {
    if (q8 === 1) return 'engineering'; 
    if (q8 === 2) return 'energy';      
    if (q8 === 3) return 'quant';       
    if (q8 === 0) {
      if (employer === 0 || employer === 3) return 'energy'; 
      return 'manufacturing'; 
    }
  }
  
  return 'manufacturing';
}

function showResult(){
  document.getElementById('load-sec').style.display='none';
  const r=results[getDir()];
  
  // 核心逻辑：判断Q1是不是选了第1项（本科在读或应届，索引为0）
  const isUndergrad = (answers['q1'] === 0);

  document.getElementById('res-title').textContent=r.title;
  document.getElementById('res-hook').textContent=r.hook;
  document.getElementById('res-fit').innerHTML=r.fit;
  
  // 根据学历发放对应的岗位列表
  const jobList = isUndergrad ? r.jobs_ug : r.jobs_pg;
  document.getElementById('res-jobs').innerHTML=jobList.map(j=>`<div class="job-row"><div class="job-dot"></div><div class="job-name">${j.n}</div><div class="job-tag">${j.t}</div></div>`).join('');
  
  // 如果是本科生，在底部总结处悄悄加一句专属破局提示
  let finalTeaser = r.teaser;
  if(isUndergrad) {
    finalTeaser = "<p style='color:#7c3aed; font-size:13px; margin-bottom:12px; padding:10px; background:#f5f0ff; border-radius:8px;'><b>💡 本科生直接就业提示：</b><br>核心算法岗普遍卡硕士学历，但你可以通过上述<b>应用型/运营类/测试类</b>的基础岗位直接切入赛道，先上车积累行业实战经验，避开学历内卷。</p>" + finalTeaser;
  }
  document.getElementById('res-teaser').innerHTML=finalTeaser;
  
  document.getElementById('res-sec').style.display='block';
}

function showContact(){
  document.getElementById('wechat-id').textContent=WECHAT_ID;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}

function copyWechat(){
  navigator.clipboard.writeText(WECHAT_ID).then(()=>{
    const btn=document.querySelector('.btn-copy');
    btn.textContent='✓ 已复制';
    setTimeout(()=>{btn.textContent='复制微信号';},2000);
  }).catch(()=>{
    prompt('请手动复制微信号：',WECHAT_ID);
  });
}

function restart(){
  cur=0;answers={};selected=null;majorVal=null;allQs=[];
  document.getElementById('res-sec').style.display='none';
  document.getElementById('quiz-sec').style.display='block';
  buildQs();render();
}

buildQs();render();
</script>
